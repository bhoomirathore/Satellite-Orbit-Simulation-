<!DOCTYPE html>
<html>
<head>
    <title>Orbit Simulator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Mission Control - Orbit Simulator</h1>

<div id="controls">
    <label>
        Altitude (km):
        <input type="number" id="altitudeInput" value="300">
    </label>

    <label>
        Velocity Multiplier:
        <input type="number" step="0.01" id="velocityInput" value="1">
    </label>

    <label>
        Drag (rho):
        <input type="number" step="1e-12" id="rhoInput" value="1e-12">
    </label>

    <button id="launchButton" type="button">Launch Simulation</button>
</div>

<canvas id="orbitCanvas" width="600" height="600"></canvas>

<script src="/static/script.js"></script>

</body>
